<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusAI — Dynamic Chat Interface | Project Showcase</title>

  <style>
    /* ==========================================
       1. DESIGN SYSTEM & VARIABLE TOKENIZATION
       ========================================== */
    :root {
      --bg-app: #09090b; 
      --bg-sidebar: #020205;
      --bg-card: #18181b;
      --border-main: rgba(255, 255, 255, 0.06);
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      --accent-purple: #6366f1; 
      --font-system: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      --easing-smooth: cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      margin: 0;
      background-color: var(--bg-app);
      color: var(--text-main);
      font-family: var(--font-system);
      display: flex;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ==========================================
       2. LAYOUT ARCHITECTURE
       ========================================== */
    .sidebar {
      width: 260px;
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border-main);
      display: flex;
      flex-direction: column;
      padding: 16px;
      box-sizing: border-box;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      background-color: var(--accent-purple);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-purple);
    }

    /* 路由解耦：丝滑返回主站 HUB */
    .hub-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .hub-link:hover {
      color: var(--text-main);
    }

    .new-chat-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-main);
      color: var(--text-main);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }

    .new-chat-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .history-list {
      margin-top: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }

    .history-item {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.2s;
    }

    .history-item:hover, .history-item.active {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-main);
    }

    /* 右侧核心面板 */
    .main-workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      box-sizing: border-box;
    }

    .message-row {
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 20px;
      animation: messageFadeIn 0.4s var(--easing-smooth) forwards;
    }

    @keyframes messageFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .avatar.user {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
    }

    .avatar.ai {
      background: var(--accent-purple);
      color: #fff;
    }

    .message-content {
      line-height: 1.6;
      font-size: 15px;
      color: var(--text-main);
      padding-top: 4px;
    }

    .input-panel {
      padding: 24px;
      background: linear-gradient(to top, var(--bg-app) 80%, transparent);
    }

    .input-container {
      max-width: 760px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-main);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      backdrop-filter: blur(20px);
      transition: border-color 0.3s;
    }

    .input-container:focus-within {
      border-color: rgba(255, 255, 255, 0.18);
    }

    textarea {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-family: var(--font-system);
      font-size: 15px;
      resize: none;
      height: 44px;
      line-height: 1.5;
    }

    textarea::placeholder {
      color: #52525b;
    }

    .input-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tech-badges {
      display: flex;
      gap: 8px;
    }

    .badge {
      font-size: 11px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid var(--border-main);
    }

    .send-btn {
      background: var(--text-main);
      color: var(--bg-app);
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .send-btn:hover { opacity: 0.9; }

    .welcome-holder {
      max-width: 500px;
      margin: auto;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .welcome-holder h2 { font-size: 28px; font-weight: 600; letter-spacing: -1px; margin: 0; }
    .welcome-holder p { color: var(--text-muted); font-size: 15px; line-height: 1.5; margin: 0; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="brand-title">
      <div class="brand-dot"></div> NexusAI Studio
    </div>
    <!-- 统一重构：回退主入口 -->
    <a href="index.html" class="hub-link">← Back to Portfolio</a>
    
    <button class="new-chat-btn" id="resetBtn">+ New Architecture Prompt</button>
    <div class="history-list">
      <div class="history-item active">✦ Optimization Workflow</div>
      <div class="history-item">✦ Async Canvas Render</div>
      <div class="history-item">✦ Tokenized UI Specs</div>
    </div>
  </aside>

  <main class="main-workspace">
    <div class="chat-container" id="chatWindow">
      <div class="welcome-holder" id="welcomeScreen">
        <h2>How can we scale your app today?</h2>
        <p>Type a prompt below to see the interactive DOM generation engine simulate a production-grade response workflow.</p>
      </div>
    </div>

    <div class="input-panel">
      <div class="input-container">
        <textarea id="userInput" placeholder="Ask NexusAI to build or optimize an interface token..."></textarea>
        <div class="input-controls">
          <div class="tech-badges">
            <span class="badge">Model: Cortex-v4</span>
            <span class="badge">Latency: 12ms</span>
          </div>
          <button class="send-btn" id="sendBtn">Execute</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const chatWindow = document.getElementById('chatWindow');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const resetBtn = document.getElementById('resetBtn');

    const aiResponses = [
      "Analyzing layout vectors. I have structuralized a 3-tier reactive UI grid with fully isolated CSS design tokens. Compiling pipeline optimized via standard hardware acceleration layer.",
      "Asynchronous render routine triggered. Canvas buffer cleared successfully. Executing fluid physics matrix on requestAnimationFrame loops to intercept drop-frame hazards on high-Hz displays.",
      "Interface specifications refactored. Extracted inline components into decoupled atomic class structures. Build optimization complete: Lighthouse performance metrics project score of 100/100."
    ];
    let responseIndex = 0;

    function appendMessage(sender, text) {
      if (welcomeScreen) welcomeScreen.style.display = 'none';

      const row = document.createElement('div');
      row.className = `message-row ${sender}-row`;

      const avatar = document.createElement('div');
      avatar.className = `avatar ${sender}`;
      avatar.innerText = sender === 'user' ? 'UQ' : 'AI';

      const content = document.createElement('div');
      content.className = 'message-content';
      
      row.appendChild(avatar);
      row.appendChild(content);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;

      if (sender === 'ai') { simulateTypewriter(content, text); } 
      else { content.innerText = text; }
    }

    function simulateTypewriter(element, text) {
      let index = 0;
      element.innerText = '';
      function type() {
        if (index < text.length) {
          element.innerText += text.charAt(index);
          index++;
          chatWindow.scrollTop = chatWindow.scrollHeight;
          setTimeout(type, 15); 
        }
      }
      type();
    }

    function handleSend() {
      const query = userInput.value.trim();
      if (!query) return;

      appendMessage('user', query);
      userInput.value = '';
      sendBtn.disabled = true;
      sendBtn.innerText = "Thinking...";
      
      setTimeout(() => {
        const responseText = aiResponses[responseIndex % aiResponses.length];
        responseIndex++;
        appendMessage('ai', responseText);
        sendBtn.disabled = false;
        sendBtn.innerText = "Execute";
      }, 800);
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    resetBtn.addEventListener('click', () => {
      chatWindow.innerHTML = '';
      chatWindow.appendChild(welcomeScreen);
      welcomeScreen.style.display = 'flex';
    });
  </script>
</body>
</html>
